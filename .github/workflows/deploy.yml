name: Deploy to S3

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and sync to S3
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync dist/ to S3
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: aws s3 sync ./dist "s3://${S3_BUCKET}" --delete

  smoke-test:
    name: Post-deploy smoke test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Probe live site
        env:
          SITE_URL: http://${{ secrets.S3_BUCKET }}.s3-website-${{ secrets.AWS_REGION }}.amazonaws.com
        run: |
          echo "Probing $SITE_URL"
          body=$(curl -fsS --retry 5 --retry-delay 3 --retry-connrefused "$SITE_URL")
          echo "$body" | grep -q "Lab 14" || { echo "::error::expected 'Lab 14' in response"; exit 1; }
          echo "$body" | grep -q '<div id="root"></div>' || { echo "::error::root div missing"; exit 1; }
          echo "Smoke test passed."
